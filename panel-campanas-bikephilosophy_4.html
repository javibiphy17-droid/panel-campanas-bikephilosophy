<div class="container">
<div class="hdr">
  <div class="logo-block">
    <span class="logo-line l-white">BIKE</span>
    <span class="logo-line l-green">PHILO&bull;</span>
    <span class="logo-line l-green">SOPHY</span>
  </div>
  <div class="hdr-right">
    <div class="hdr-label">Panel Campanas</div>
    <div class="sync-status">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncText" style="color:#555">Conectando...</span>
    </div>
  </div>
</div>

  <div class="role-label">Ver como:</div>

<script>
// ── CONFIGURACION ──────────────────────────────────────────
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyEqfhOncllYhml5A4cKKXXVWyo4V1P9Kz379xyROk5l6f8Bw24WZGV4sQv-EQTeFD_/exec';

// ── LLAMADAS AL PROXY ──────────────────────────────────────
async function proxyGet(range) {
  try {
    const url = `${PROXY_URL}?action=get&range=${encodeURIComponent(range)}`;
    const r = await fetch(url);
    const data = await r.json();
    return data.ok ? data.values : null;
  } catch(e) { return null; }
}

async function proxySet(range, values) {
  try {
    setSyncStatus('loading','Guardando...');
    const url = `${PROXY_URL}?action=set&range=${encodeURIComponent(range)}&values=${encodeURIComponent(JSON.stringify(values))}`;
    const r = await fetch(url);
    const data = await r.json();
    if(data.ok) setSyncStatus('ok','Guardado');
    else setSyncStatus('err','Error al guardar');
    return data.ok;
  } catch(e) { setSyncStatus('err','Error'); return false; }
}

async function proxyAppend(sheet, values) {
  try {
    const url = `${PROXY_URL}?action=append&sheet=${encodeURIComponent(sheet)}&values=${encodeURIComponent(JSON.stringify([values]))}`;
    const r = await fetch(url);
    const data = await r.json();
    return data.ok;
  } catch(e) { return false; }
}

async function proxyInit() {
  try {
    const url = `${PROXY_URL}?action=init`;
    const r = await fetch(url);
    const data = await r.json();
    return data.ok;
  } catch(e) { return false; }
}

// ── DATOS ──────────────────────────────────────────────────
const TASK_DEF = {
  hernan:[
    {id:'h1',label:'Videos inicio campana',hint:'Objetivo: 5'},
    {id:'h2',label:'Imagenes inicio campana',hint:'Objetivo: 10'},
    {id:'h3',label:'Fotos carousel',hint:''},
    {id:'h4',label:'Videos reels',hint:''},
    {id:'h5',label:'Fotos historias',hint:''},
    {id:'h6',label:'Videos historias',hint:''},
    {id:'h7',label:'Enlace producto en bio',hint:''},
    {id:'h8',label:'Frase de campana publicada',hint:''},
    {id:'h9',label:'Video largo YouTube',hint:''},
    {id:'h10',label:'Short clip YouTube',hint:''},
    {id:'h11',label:'TikTok video campana',hint:''},
  ],
  raquel:[
    {id:'r1',label:'Campana generica Google Ads',hint:''},
    {id:'r2',label:'Campana concreta producto',hint:''},
    {id:'r3',label:'Anuncios YouTube especificos',hint:''},
    {id:'r4',label:'Remarketing activado',hint:''},
    {id:'r5',label:'Boton llamada a la accion',hint:''},
    {id:'r6',label:'Frase de campana en Ads',hint:''},
    {id:'r7',label:'Posicionamiento SEO',hint:''},
    {id:'r8',label:'Estrategia backlinks',hint:''},
    {id:'r9',label:'Foto principal optimizada Google',hint:''},
  ],
  moises:[
    {id:'m1',label:'Etiqueta oferta en tienda',hint:''},
    {id:'m2',label:'Colocacion piramide masificacion',hint:''},
    {id:'m3',label:'Cartel exclusivo producto',hint:''},
    {id:'m4',label:'Formacion personal producto',hint:''},
    {id:'m5',label:'Formacion tecnica de venta',hint:''},
    {id:'m6',label:'Revisar ventas en tiendas',hint:''},
    {id:'m7',label:'Seguimiento formacion tiendas',hint:''},
  ],
  alejandro:[
    {id:'a1',label:'Fotos producto en web',hint:'Min. 4'},
    {id:'a2',label:'Fotos nuestras',hint:'Min. 2'},
    {id:'a3',label:'Descripcion producto',hint:''},
    {id:'a4',label:'Meter en pagina madre',hint:''},
    {id:'a5',label:'Producto bien colocado',hint:''},
    {id:'a6',label:'Enlace YouTube en descripcion',hint:''},
    {id:'a7',label:'Caracteristicas en cuadrante',hint:''},
    {id:'a8',label:'Foto principal destacada',hint:''},
    {id:'a9',label:'Eliminar tallas sin stock',hint:''},
    {id:'a10',label:'Trabajar resenas',hint:''},
    {id:'a11',label:'Estados WhatsApp',hint:''},
    {id:'a12',label:'Campanas WhatsApp',hint:''},
    {id:'a13',label:'Telegram campana',hint:''},
    {id:'a14',label:'APP oferta novedades',hint:''},
    {id:'a15',label:'Descuento especial APP',hint:''},
  ],
  tiendas:[
    {id:'t1',label:'Precio actualizado en tienda',hint:''},
    {id:'t2',label:'Producto visible y colocado',hint:''},
    {id:'t3',label:'Formacion recibida',hint:''},
    {id:'t4',label:'Ventas reportadas',hint:''},
  ]
};
const RL={hernan:'Hernan',raquel:'Raquel',moises:'Moises',alejandro:'Alejandro',tiendas:'Tiendas'};
const ROLES=[{id:'javi',label:'Javi (CEO)'},{id:'hernan',label:'Hernan'},{id:'raquel',label:'Raquel'},{id:'moises',label:'Moises'},{id:'alejandro',label:'Alejandro'},{id:'tiendas',label:'Tiendas'}];

// ── ESTADO ─────────────────────────────────────────────────
let DB={camps:[],tasks:{},cfg:{},deadlines:{}};
let currentRole=localStorage.getItem('bp_role')||'javi';
let activeTab='ceo';
let campTab={};
let fichaTab={};

// ── CARGA DESDE SHEETS ─────────────────────────────────────
async function loadFromSheets(){
  setSyncStatus('loading','Cargando...');
  try {
    const campsData=await proxyGet('Campanas!A2:H200');
    if(campsData){
      DB.camps=campsData.filter(r=>r[0]).map(r=>({
        id:r[0]||'',name:r[1]||'',tipo:r[2]||'',
        fechaInicio:r[3]||'',fechaDeadline:r[4]||'',fechaFin:r[5]||'',
        productos:safeJSON(r[6],'[]'),precios:safeJSON(r[7],'[]')
      }));
    }
    const tasksData=await proxyGet('Tareas!A2:F5000');
    DB.tasks={};
    if(tasksData){
      tasksData.filter(r=>r[0]).forEach(r=>{
        DB.tasks[`${r[0]}|${r[1]}|${r[2]}`]={state:r[3]||'pending',note:r[4]||'',ts:r[5]||''};
      });
    }
    const cfgData=await proxyGet('Config!A2:E5000');
    DB.cfg={};DB.deadlines={};
    if(cfgData){
      cfgData.filter(r=>r[0]).forEach(r=>{
        DB.cfg[`${r[0]}|${r[1]}|${r[2]}`]=r[3]==='1';
        if(r[4])DB.deadlines[`${r[0]}|${r[1]}|${r[2]}`]=r[4];
      });
    }
    setSyncStatus('ok','Sincronizado');
  } catch(e){setSyncStatus('err','Error de carga');}
  buildUI();
}

function safeJSON(str,def){try{return JSON.parse(str||def);}catch(e){return JSON.parse(def);}}

// ── GUARDAR ────────────────────────────────────────────────
async function saveCamps(){
  const values=DB.camps.map(c=>[c.id,c.name,c.tipo,c.fechaInicio,c.fechaDeadline,c.fechaFin,JSON.stringify(c.productos),JSON.stringify(c.precios)]);
  await proxySet('Campanas!A2',values.length?values:[['','','','','','','[]','[]']]);
}

async function saveTask(cid,resp,tid,state,note){
  const ts=new Date().toISOString();
  DB.tasks[`${cid}|${resp}|${tid}`]={state,note,ts};
  const tasksData=await proxyGet('Tareas!A2:F5000')||[];
  let found=false;
  const newRows=tasksData.map(r=>{
    if(r[0]===cid&&r[1]===resp&&r[2]===tid){found=true;return[cid,resp,tid,state,note,ts];}
    return r;
  });
  if(!found)newRows.push([cid,resp,tid,state,note,ts]);
  await proxySet('Tareas!A2',newRows);
}

async function saveCfg(cid,resp,tid,active,deadline){
  DB.cfg[`${cid}|${resp}|${tid}`]=active;
  if(deadline!==undefined)DB.deadlines[`${cid}|${resp}|${tid}`]=deadline;
  const cfgData=await proxyGet('Config!A2:E5000')||[];
  let found=false;
  const newRows=cfgData.map(r=>{
    if(r[0]===cid&&r[1]===resp&&r[2]===tid){found=true;return[cid,resp,tid,active?'1':'0',deadline||r[4]||''];}
    return r;
  });
  if(!found)newRows.push([cid,resp,tid,active?'1':'0',deadline||'']);
  await proxySet('Config!A2',newRows);
}

// ── HELPERS ────────────────────────────────────────────────
function isCfgOn(cid,r,t){return DB.cfg[`${cid}|${r}|${t}`]===true}
function getDL(cid,r,t){return DB.deadlines[`${cid}|${r}|${t}`]||''}
function getTask(cid,r,t){return DB.tasks[`${cid}|${r}|${t}`]||{state:'pending',note:'',ts:''}}
function activeTasks(cid,r){return(TASK_DEF[r]||[]).filter(t=>isCfgOn(cid,r,t.id))}
function calcPct(cid,r){
  const at=activeTasks(cid,r);if(!at.length)return{pct:0,done:0,prog:0,total:0};
  const states=at.map(t=>getTask(cid,r,t.id).state);
  const done=states.filter(x=>x==='done').length;
  const prog=states.filter(x=>x==='progress').length;
  return{pct:Math.round(((done+prog*0.5)/at.length)*100),done,prog,total:at.length};
}
function calcTotal(cid){
  const pcts=Object.keys(TASK_DEF).map(r=>calcPct(cid,r).pct);
  return Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y.slice(2)}`}
function dlTag(dl){
  if(!dl)return`<span class="dl-tag dt-none"><i class="ti ti-calendar"></i>Sin fecha</span>`;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dl+'T00:00:00');const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0)return`<span class="dl-tag dt-over"><i class="ti ti-alert-circle"></i>Vencida ${Math.abs(diff)}d</span>`;
  if(diff<=3)return`<span class="dl-tag dt-soon"><i class="ti ti-clock"></i>${diff===0?'Hoy':diff===1?'Manana':'En '+diff+'d'}</span>`;
  return`<span class="dl-tag dt-ok"><i class="ti ti-calendar"></i>${fmtDate(dl)}</span>`;
}

function buildUI(){
  document.getElementById('footerDate').textContent=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
  const rb=document.getElementById('roleBtns');
  if(rb)rb.innerHTML=ROLES.map(r=>`<button class="role-btn${currentRole===r.id?' on':''}" onclick="setRole('${r.id}')">${r.label}</button>`).join('');
  const tabsEl=document.getElementById('tabs');
  const viewsEl=document.getElementById('views');
  tabsEl.innerHTML='';viewsEl.innerHTML='';
  let allTabs=[];
  if(currentRole==='javi'){
    allTabs=[
      {id:'ceo',label:'CEO'},
      {id:'nueva',label:'+ Nueva',green:true},
      {id:'cfg',label:'Configurar',green:true},
      {id:'ficha',label:'Ficha'},
      ...Object.keys(TASK_DEF).map(r=>({id:r,label:RL[r]}))
    ];
  } else {
    allTabs=[{id:currentRole,label:RL[currentRole]||currentRole}];
    activeTab=currentRole;
  }
  allTabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tb'+(activeTab===t.id?' on':t.green?' green':'');
    btn.textContent=t.label;
    btn.onclick=()=>{activeTab=t.id;buildUI()};
    tabsEl.appendChild(btn);
    const div=document.createElement('div');
    div.className='view'+(activeTab===t.id?' on':'');
    div.id='view-'+t.id;
    viewsEl.appendChild(div);
  });
  if(currentRole==='javi'){
    renderCEO();renderNueva();renderCfg();renderFicha();
    Object.keys(TASK_DEF).forEach(r=>renderResp(r));
  } else {
    renderResp(currentRole);
  }
}

async function crearCampana(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){showToast('Escribe el nombre');return;}
  const id='c'+Date.now();
  const camp={id,name,tipo:document.getElementById('nc-tipo').value.trim(),
    fechaInicio:document.getElementById('nc-ini').value,
    fechaDeadline:document.getElementById('nc-dl').value,
    fechaFin:document.getElementById('nc-fin').value,
    productos:[],precios:[]};
  DB.camps.push(camp);
  await saveCamps();
  showToast('Campana "'+name+'" creada y guardada');
  activeTab='ficha';campTab['ficha']=id;fichaTab[id]='productos';buildUI();
}

async function eliminarCampana(cid){
  const c=DB.camps.find(x=>x.id===cid);if(!c)return;
  if(!confirm('Eliminar "'+c.name+'"?'))return;
  DB.camps=DB.camps.filter(x=>x.id!==cid);
  await saveCamps();buildUI();
}

  const el=document.getElementById('view-'+resp);if(!el)return;
  if(!DB.camps.length){el.innerHTML='<div class="empty-state">No hay campanas.</div>';return;}
  const cid=campTab[resp]||DB.camps[0].id;

  const allDone=total>0&&done===total;
  let h=`<div class="camp-sel">${DB.camps.map(c=>`<button class="cb${cid===c.id?' on':''}" onclick="selCamp('${resp}','${c.id}')">${c.name}</button>`).join('')}</div>`;
  if(!total){h+=`<div class="empty-state"><i class="ti ti-checks" style="font-size:24px;display:block;margin-bottom:8px;opacity:.4"></i>Sin tareas asignadas.<br><span style="font-size:11px">Javi las activa desde Configurar.</span></div>`;el.innerHTML=h;return;}
  const camp=DB.camps.find(c=>c.id===cid);
  if(camp&&camp.productos&&camp.productos.length){
    h+=`<div class="card" style="padding:.5rem .75rem;margin-bottom:.75rem;background:#f5f5f5">

      </div>`;
    });
    const pa=camp.precios&&camp.precios.length?camp.precios[camp.precios.length-1]:null;
    if(pa)h+=`<div style="margin-top:5px;padding-top:5px;border-top:.5px solid rgba(0,0,0,0.08);font-size:11px;font-family:'Barlow Condensed',sans-serif"><i class="ti ti-tag"></i> Precio oferta: <span class="precio-actual">${pa.precio}</span></div>`;
    h+=`</div>`;
  }
  h+=`<div class="stat-grid">
    <div class="sc"><div class="sl">Completadas</div><div class="sv" style="color:#3B6D11">${done}</div><div style="font-size:10px;color:#888">de ${total}</div></div>
    <div class="sc"><div class="sl">En curso</div><div class="sv" style="color:#854F0B">${prog}</div></div>
    <div class="sc"><div class="sl">Progreso</div><div class="sv">${pct}%</div><div class="pbar"><div class="pb ${pct===100?'pb-g':'pb-a'}" style="width:${pct}%"></div></div></div>
  </div>`;
  h+=`<div class="sec-title">Mis tareas -- ${camp?.name}</div>`;
  at.forEach(t=>{
    const d=getTask(cid,resp,t.id);const st=d.state||'pending';
    const dl=getDL(cid,resp,t.id);
    const ts=d.ts?new Date(d.ts).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const dotc=st==='done'?'dd':st==='progress'?'dr':'dp';
    h+=`<div class="task-card">
      <div class="task-top">
        <div class="sdot ${dotc}"></div>
        <div class="tlabel">${t.label}${t.hint?`<span class="hint">${t.hint}</span>`:''}${dlTag(dl)}</div>
      </div>
      <div class="sbts">
        <button class="sb sp${st==='pending'?' on':''}" onclick="updateTask('${cid}','${resp}','${t.id}','pending',getNote('${cid}','${resp}','${t.id}'))">Pendiente</button>
        <button class="sb sr${st==='progress'?' on':''}" onclick="updateTask('${cid}','${resp}','${t.id}','progress',getNote('${cid}','${resp}','${t.id}'))">En curso</button>
        <button class="sb sd${st==='done'?' on':''}" onclick="updateTask('${cid}','${resp}','${t.id}','done',getNote('${cid}','${resp}','${t.id}'))">Completado</button>
      </div>
      <textarea class="tnote" id="note-${cid}-${resp}-${t.id}" rows="1" placeholder="Nota..." oninput="autoH(this)" onblur="updateTask('${cid}','${resp}','${t.id}','${st}',this.value)">${d.note||''}</textarea>
      ${ts?`<div class="tmeta"><i class="ti ti-clock" style="font-size:10px;vertical-align:-1px"></i> ${ts}</div>`:''}
    </div>`;
  });
  h+=`<button class="notify-btn" ${allDone?'':'disabled'} onclick="notifyJavi('${resp}','${cid}')">
    <i class="ti ti-${allDone?'send':'lock'}"></i>
    ${allDone?'Notificar a Javi -- todo completado':'Completa todas las tareas para notificar'}
  </button>`;
  el.innerHTML=h;
  el.querySelectorAll('.tnote').forEach(ta=>autoH(ta));
}

function getNote(cid,resp,tid){const el=document.getElementById(`note-${cid}-${resp}-${tid}`);return el?el.value:(getTask(cid,resp,tid).note||'');}

  alert('AVISO PARA JAVI:\n\n'+RL[resp]+' ha completado todas sus tareas\nde la campana: '+camp.name+'\n\nFecha: '+new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}));
